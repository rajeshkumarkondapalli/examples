---
# ClusterIP service — only accessible within the cluster.
# The RAG app connects using: mongodb://mongodb-svc:27017
apiVersion: v1
kind: Service
metadata:
  name: mongodb-svc
  labels:
    app: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - name: mongo
      protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP
