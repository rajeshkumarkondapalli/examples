---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-app
  labels:
    app: rag-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-app
  template:
    metadata:
      labels:
        app: rag-app
    spec:
      containers:
        - name: rag-app
          image: rag-app:latest
          # Use imagePullPolicy: Always when pulling from a registry
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # MongoDB URI — use Atlas URI for production or in-cluster service
            # for dev (mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb-svc:27017)
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: MONGO_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: MONGO_PASSWORD
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: MONGODB_URI
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: OPENAI_API_KEY
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: DB_NAME
            - name: COLLECTION_NAME
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: COLLECTION_NAME
            - name: PORT
              value: "8080"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
