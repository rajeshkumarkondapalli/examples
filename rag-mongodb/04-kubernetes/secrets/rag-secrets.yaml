---
# IMPORTANT: Do NOT commit real secrets to source control.
# This file is a template — replace <base64-encoded-value> with actual values.
#
# Encode a value:  echo -n "your-value" | base64
# Decode a value:  echo "base64string" | base64 --decode
#
# For production, use an external secrets manager:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault + Vault Agent Injector
#   - Sealed Secrets (Bitnami)
apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  labels:
    app: rag-app
type: Opaque
data:
  # MongoDB Atlas connection string (production)
  # e.g. echo -n "mongodb+srv://user:pass@cluster.mongodb.net/?retryWrites=true" | base64
  MONGODB_URI: <base64-encoded-atlas-uri>

  # In-cluster MongoDB credentials (dev/test with mongodb pod)
  MONGO_USERNAME: <base64-encoded-username>   # e.g. echo -n "admin" | base64 → YWRtaW4=
  MONGO_PASSWORD: <base64-encoded-password>

  # OpenAI API key
  OPENAI_API_KEY: <base64-encoded-openai-key>
